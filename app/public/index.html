<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>User Management</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f5;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .card {
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 2px 12px rgba(0,0,0,.08);
      padding: 40px;
      width: 100%;
      max-width: 440px;
    }
    h1 { font-size: 1.4rem; margin-bottom: 24px; color: #111; }
    label { display: block; font-size: .85rem; font-weight: 600; color: #333; margin-bottom: 4px; }
    input {
      width: 100%;
      padding: 9px 12px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 1rem;
      margin-bottom: 16px;
      transition: border-color .15s;
    }
    input:focus { outline: none; border-color: #555; }
    #create-user-btn {
      width: 100%;
      padding: 11px;
      font-size: 1rem;
      font-weight: 600;
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      /* default green (control group) – overridden by A/B test */
      background-color: green;
      transition: opacity .15s;
    }
    #create-user-btn:hover { opacity: .88; }
    #message { margin-top: 14px; font-size: .9rem; min-height: 20px; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Create User</h1>
    <form id="create-user-form">
      <label for="name">Name</label>
      <input type="text"  id="name"  placeholder="Enter name"  required />

      <label for="email">Email</label>
      <input type="email" id="email" placeholder="Enter email" required />

      <button type="submit" id="create-user-btn">Create User</button>
    </form>
    <p id="message"></p>
  </div>

  <script>
    // ── PostHog browser snippet ──────────────────────────────────
    !function(t,e){var o,n,p,r;e.__SV||(window.posthog=e,e._i=[],e.init=function(i,s,a){function g(t,e){var o=e.split(".");2==o.length&&(t=t[o[0]],e=o[1]);t[e]=function(){t.push([e].concat(Array.prototype.slice.call(arguments,0)))}}(p=t.createElement("script")).type="text/javascript",p.async=!0,p.src=s.api_host+"/static/array.js",(r=t.getElementsByTagName("script")[0]).parentNode.insertBefore(p,r);var u=e;for(a!==void 0?u=e[a]=[]:a="posthog",u.people=u.people||[],u.toString=function(t){var e="posthog";return a!==void 0&&(e+="."+a),t||(e+=" (stub)"),e},u.people.toString=function(){return u.toString(1)+".people (stub)"},o="capture identify alias people.set people.set_once set_config register register_once unregister opt_out_capturing has_opted_out_capturing opt_in_capturing reset isFeatureEnabled onFeatureFlags getFeatureFlag getFeatureFlagPayload reloadFeatureFlags group updateEarlyAccessFeatureEnrollment getEarlyAccessFeatures getActiveMatchingSurveys getSurveys onSessionId".split(" "),n=0;n<o.length;n++)g(u,o[n]);e._i.push([i,s,a])},e.__SV=1)}(document,window.posthog||[]);

    // Replace with your actual PostHog key (Project Settings → Project API key)
    posthog.init('phc_zfaPvchWYbQkhZ9DFSnqKnYf43QcCBnLYZrnQedJrhee', {
      api_host: 'https://eu.i.posthog.com',
      loaded: function(ph) {
        // Identify the session so feature flags resolve correctly
        ph.identify(ph.get_distinct_id());
      }
    });

    // ── A/B Test: experiment-user-button-style ───────────────────
    // control  → green button
    // test     → blue button
    posthog.onFeatureFlags(function() {
      const btn     = document.getElementById('create-user-btn');
      const variant = posthog.getFeatureFlag('experiment-user-button-style');
      btn.style.backgroundColor = (variant === 'test') ? 'blue' : 'green';
    });

    // ── Create user form ─────────────────────────────────────────
    document.getElementById('create-user-form').addEventListener('submit', async function(e) {
      e.preventDefault();
      const name  = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim();
      const msg   = document.getElementById('message');

      try {
        const res  = await fetch('/api/v1/users', {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ name, email }),
        });
        const data = await res.json();

        if (res.ok) {
          msg.style.color  = 'green';
          msg.textContent  = '✓ User created: ' + data.user.name;
          document.getElementById('name').value  = '';
          document.getElementById('email').value = '';
        } else {
          msg.style.color = 'red';
          msg.textContent = '✗ Error: ' + data.error;
        }
      } catch (err) {
        msg.style.color = 'red';
        msg.textContent = '✗ Request failed.';
      }
    });
  </script>
</body>
</html>
